services:
  postgres:
    image: postgres:16-alpine
    container_name: neuralvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neuralvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuralvault}
      POSTGRES_DB: ${POSTGRES_DB:-neuralvault}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neuralvault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.3
    container_name: neuralvault-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q healthz <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: neuralvault-ollama
    restart: unless-stopped
    environment:
      # Ollama's default keep_alive (5m) unloads a model after 5 minutes of
      # inactivity, so the next query pays the full load cost again (tens of
      # seconds for a multi-GB model). For a single-user self-hosted setup
      # that cost is rarely worth paying repeatedly, so keep loaded models
      # resident for longer between queries.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # CPU-only by default so `docker compose up` works on any machine. If you
    # have an NVIDIA GPU and the NVIDIA Container Toolkit installed, layer
    # docker-compose.gpu.yml on top instead of adding GPU config here — see
    # getting-started.md.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/11434 && echo -e \"GET / HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q Ollama <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: neuralvault-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: neuralvault-reranker
    restart: unless-stopped
    command: --model-id ${RERANKER_MODEL:-BAAI/bge-reranker-base}
    ports:
      - "${RERANKER_PORT:-8082}:80"
    volumes:
      - reranker_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/80 && echo -e \"GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 5
      # First startup downloads the model (hundreds of MB); give it real room
      # before the healthcheck starts marking failures.
      start_period: 120s

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: neuralvault-keycloak
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./docker/keycloak/import:/opt/keycloak/data/import:ro
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q UP <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  minio_data:
  keycloak_data:
  reranker_data: