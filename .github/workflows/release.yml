name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Build API binary
        working-directory: api
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../dist/neuralvault-linux-amd64 ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -o ../dist/neuralvault-darwin-arm64 ./cmd/server
          GOOS=windows GOARCH=amd64 go build -o ../dist/neuralvault-windows-amd64.exe ./cmd/server

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true