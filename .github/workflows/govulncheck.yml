name: Go Vulnerability Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  govulncheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck ./...
        working-directory: api