name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

jobs:
  analyze:
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language:
          - go
          - javascript

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4