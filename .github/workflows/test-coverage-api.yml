name: Coverage

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: neuralvault
          POSTGRES_PASSWORD: neuralvault
          POSTGRES_DB: neuralvault
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      qdrant:
        image: qdrant/qdrant:v1.18.2
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6333:6333
          - 6334:6334

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: neuralvault
      POSTGRES_PASSWORD: neuralvault
      POSTGRES_NAME: neuralvault
      QDRANT_URL: localhost
      QDRANT_GRPC_PORT: 6334
      QDRANT_API_KEY: ""

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod

      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out

      - name: Publish step summary
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}')
          {
            echo "## Coverage Report"
            echo ""
            echo "**Total: ${TOTAL}**"
            echo ""
            echo "<details><summary>Full breakdown</summary>"
            echo ""
            printf '```\n'
            go tool cover -func=coverage.out
            printf '```\n'
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: api/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
