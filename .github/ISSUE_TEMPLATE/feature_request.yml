name: Feature request
description: Suggest a new feature or improvement
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the [roadmap](https://github.com/jpgomesr/NeuralVault/blob/main/docs/roadmap.md)
        to see if this is already planned.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is affected and how?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you want to happen. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about and why you ruled them out.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, references, or any other context.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the roadmap and this is not already planned
          required: true
        - label: I searched existing issues and this has not been requested before
          required: true