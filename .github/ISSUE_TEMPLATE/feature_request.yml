name: Feature request
description: Propose a new capability for NeuralVault
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new feature or capability.
        Before submitting, check the [roadmap](https://github.com/jpgomesr/neuralvault/blob/main/docs/roadmap.md) — it may already be planned.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of NeuralVault does this feature belong to?
      options:
        - Ingestion (chunking, source connectors, indexing)
        - Retrieval (search, reranking, context compression)
        - LLM / providers (models, routing, streaming)
        - Memory (persistence, active memory, knowledge graph)
        - Chat UI (frontend, UX)
        - API (endpoints, auth, configuration)
        - Developer tooling (VSCode, CLI, integrations)
        - Infrastructure (Docker, deployment, observability)
        - Other
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: Who is this for and what should they be able to do?
      description: Describe the user and the capability they need. Focus on outcome, not implementation.
      placeholder: |
        As a [developer / team / user],
        I want to [do something with NeuralVault],
        so that [I get this outcome].
    validations:
      required: true

  - type: textarea
    id: behaviour
    attributes:
      label: Expected behaviour
      description: What should NeuralVault do exactly? Describe inputs, outputs, and any edge cases you can think of.
      placeholder: |
        When I do X...
        NeuralVault should...
        The result should look like...
        It should NOT...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, related issues, prior art, or anything else that helps evaluate this feature.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the roadmap and this is not already planned
          required: true
        - label: I searched existing issues and this has not been requested before
          required: true