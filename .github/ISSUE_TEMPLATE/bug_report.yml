name: Bug report
description: Report something that is broken or not working as expected
title: "fix: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Do '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04, macOS 14, Windows 11
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker version
      placeholder: e.g. 26.1.0
    validations:
      required: false

  - type: input
    id: ollama-version
    attributes:
      label: Ollama version
      placeholder: e.g. 0.1.44
    validations:
      required: false

  - type: input
    id: neuralvault-version
    attributes:
      label: NeuralVault version
      placeholder: e.g. 0.1.0 or commit hash
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run `docker compose logs <service>` and paste the output here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that might help.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this has not been reported before
          required: true
        - label: I am using the latest version of NeuralVault
          required: false