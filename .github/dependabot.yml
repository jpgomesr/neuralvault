version: 2

updates:
  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    groups:
      go-patch-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - typescript
    groups:
      npm-patch-minor:
        update-types:
          - minor
          - patch
    versioning-strategy: increase

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    groups:
      docker-patch-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    groups:
      docker-patch-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions-patch-minor:
        update-types:
          - minor
          - patch