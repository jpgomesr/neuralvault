basePath: /
definitions:
  auth.tokenRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  catalog.Provider:
    enum:
    - ollama
    - anthropic
    - gemini
    - openrouter
    - groq
    - github
    - openai
    type: string
    x-enum-varnames:
    - Ollama
    - Anthropic
    - Gemini
    - OpenRouter
    - Groq
    - GitHub
    - OpenAI
  health.Report:
    properties:
      services:
        additionalProperties:
          type: string
        type: object
      status:
        type: string
    type: object
  modelconfig.EmbeddingChange:
    properties:
      collection:
        description: Collection is the Qdrant collection the workspace's vectors now
          live in.
        type: string
      dimensions:
        description: Dimensions is the vector size discovered by probing the provider.
        type: integer
      reindex_required:
        description: |-
          ReindexRequired is true when the workspace has sources that were embedded
          with a different model. Until they are re-indexed, the new collection is
          empty and retrieval finds nothing.
        type: boolean
      stale_sources:
        description: StaleSources is how many sources need re-indexing.
        type: integer
    type: object
  modelconfig.ProviderStatus:
    properties:
      api_key_hint:
        description: |-
          APIKeyHint is the last few characters of the stored key, for display. The
          key itself is never returned.
        type: string
      base_url:
        description: |-
          BaseURL is the endpoint in effect: the workspace's override if it set one,
          otherwise the catalog default.
        type: string
      configured:
        description: |-
          Configured reports whether the workspace has a usable credential. Always
          true for providers that need no key.
        type: boolean
      free_tier:
        description: |-
          FreeTier flags providers with a usable no-cost tier, which is what makes
          them viable for local development without running Ollama.
        type: boolean
      name:
        description: Name is the human-readable label shown in the UI.
        type: string
      provider:
        $ref: '#/definitions/catalog.Provider'
      requires_api_key:
        description: |-
          RequiresAPIKey is false only for Ollama, which is unauthenticated and
          server-local.
        type: boolean
      supports_completions:
        description: |-
          SupportsCompletions and SupportsEmbeddings gate which dropdowns a
          provider may appear in. Anthropic has no embeddings API at all, and
          Groq/OpenRouter/GitHub Models serve chat models only — offering them as
          an embedding backend would produce a runtime failure at index time.
        type: boolean
      supports_embeddings:
        type: boolean
    type: object
  modelconfig.reindexResponse:
    properties:
      queued:
        type: integer
    type: object
  modelconfig.settingsResponse:
    properties:
      embedding_dimensions:
        type: integer
      embedding_model:
        type: string
      embedding_provider:
        $ref: '#/definitions/catalog.Provider'
      llm_model:
        type: string
      llm_provider:
        $ref: '#/definitions/catalog.Provider'
    type: object
  types.ModelInfo:
    properties:
      id:
        description: ID is the value to send as CompletionRequest.Model.
        type: string
      name:
        description: |-
          Name is a human-readable label. Providers that expose no display name
          repeat the ID here.
        type: string
    type: object
info:
  contact: {}
  description: API for NeuralVault
  title: NeuralVault API
  version: 0.0.1
paths:
  /auth/callback:
    get:
      description: Validates the CSRF state, exchanges the authorization code, provisions
        the user on first login (JIT), sets the nv_session cookie, and redirects to
        the post-login URL.
      parameters:
      - description: CSRF state issued by /auth/login
        in: query
        name: state
        required: true
        type: string
      - description: OIDC authorization code
        in: query
        name: code
        required: true
        type: string
      responses:
        "302":
          description: Found
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: OIDC callback
      tags:
      - auth
  /auth/login:
    get:
      description: Sets a CSRF state cookie and redirects to the OIDC provider's authorization
        endpoint (authorization-code flow).
      responses:
        "302":
          description: Found
        "500":
          description: Internal Server Error
      summary: Start OIDC login
      tags:
      - auth
  /auth/logout:
    post:
      description: Clears the nv_session cookie.
      responses:
        "204":
          description: No Content
      summary: Log out
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the id and email of the authenticated caller.
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
      summary: Current user
      tags:
      - auth
  /auth/token:
    post:
      consumes:
      - application/json
      description: Authenticates against the OIDC provider's token endpoint via the
        password grant and issues the nv_session cookie.
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.tokenRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: Native email/password login
      tags:
      - auth
  /conversations:
    get:
      description: Returns the workspace's conversations, most recently active first.
      parameters:
      - description: Workspace UUID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: List a workspace's conversations
      tags:
      - conversations
    post:
      consumes:
      - application/json
      description: 'Creates an untitled conversation from a JSON body {"workspace_id":
        uuid}.'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Create a conversation
      tags:
      - conversations
  /conversations/{id}/messages:
    get:
      description: Returns the conversation's messages, oldest first.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: List a conversation's messages
      tags:
      - conversations
  /health:
    get:
      description: Probes every infrastructure dependency (Postgres, Qdrant, MinIO,
        Keycloak, Ollama) and reports each one. Returns 200 when all are healthy and
        503 when any is down.
      produces:
      - application/json
      responses:
        "200":
          description: All dependencies healthy
          schema:
            $ref: '#/definitions/health.Report'
        "503":
          description: One or more dependencies are down
          schema:
            $ref: '#/definitions/health.Report'
      summary: Get all health status
      tags:
      - health
  /query:
    post:
      consumes:
      - application/json
      description: 'Embeds the question from a JSON body {"workspace_id": uuid, "question":
        string, "top_k": int, "conversation_id": uuid (optional)} and returns the
        top-k matching chunks ordered by descending similarity score. If conversation_id
        is set, persists the question as a message on that conversation (no answer
        is generated here to persist).'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Query a workspace
      tags:
      - query
  /query/stream:
    post:
      consumes:
      - application/json
      description: 'Runs retrieval for a JSON body {"workspace_id": uuid, "question":
        string, "top_k": int, "conversation_id": uuid (optional)}, then streams SSE
        events: one "sources" event with the grounding chunks, incremental "token"
        events, and a terminal "done" or "error" event. If conversation_id is set,
        persists the question and the completed answer (with sources) as messages
        on that conversation.'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Stream a grounded answer (SSE)
      tags:
      - query
  /sources:
    get:
      description: Returns the sources of a workspace the caller belongs to.
      parameters:
      - description: Workspace UUID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: List sources
      tags:
      - sources
    post:
      consumes:
      - multipart/form-data
      description: Uploads one or more files to object storage and starts background
        indexing. Returns the created source and its status_url.
      parameters:
      - description: Workspace UUID
        in: formData
        name: workspace_id
        required: true
        type: string
      - description: Source name
        in: formData
        name: name
        required: true
        type: string
      - description: Files to ingest (repeatable)
        in: formData
        name: files
        required: true
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Create a source
      tags:
      - sources
  /sources/{id}:
    delete:
      description: Deletes the source, its chunks and file records, its Qdrant vectors,
        and its object-storage files.
      parameters:
      - description: Source UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Delete a source
      tags:
      - sources
  /sources/{id}/chunks:
    get:
      description: Returns the indexed chunks produced from a source.
      parameters:
      - description: Source UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: List chunks of a source
      tags:
      - sources
  /sources/{id}/files:
    get:
      description: Returns the original files stored for a source, with size and content
        type.
      parameters:
      - description: Source UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: List files of a source
      tags:
      - sources
  /sources/{id}/files/content:
    get:
      description: Streams the raw content of a single file (by its path relative
        to the source root) for inline preview or download.
      parameters:
      - description: Source UUID
        in: path
        name: id
        required: true
        type: string
      - description: File path relative to the source root
        in: query
        name: path
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Stream a source file's content
      tags:
      - sources
  /sources/{id}/ingest:
    post:
      description: Re-downloads the source's files from object storage and re-indexes
        them in the background.
      parameters:
      - description: Source UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Conflict
        "500":
          description: Internal Server Error
      summary: Re-ingest a source
      tags:
      - sources
  /sources/{id}/status:
    get:
      description: 'Server-Sent Events stream of indexing progress: progress events,
        then a terminal done or error event. Heartbeat every 30s; 15min timeout.'
      parameters:
      - description: Source UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Stream indexing status (SSE)
      tags:
      - sources
  /workspaces:
    get:
      description: Returns the workspaces the authenticated caller belongs to.
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: List workspaces
      tags:
      - workspaces
    post:
      consumes:
      - application/json
      description: 'Creates a workspace from a JSON body {"name": string}; the caller
        becomes its owner.'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: Create a workspace
      tags:
      - workspaces
  /workspaces/{workspace_id}/model-settings:
    get:
      description: Returns the workspace's chosen completion and embedding models.
        Empty fields mean it uses the server default (Ollama).
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelconfig.settingsResponse'
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Get a workspace's model settings
      tags:
      - modelconfig
  /workspaces/{workspace_id}/model-settings/embedding:
    put:
      consumes:
      - application/json
      description: 'Sets the embedding provider and model. The provider is probed
        for its vector dimension and a matching Qdrant collection is created. Existing
        sources were embedded with the previous model and are NOT migrated: the response
        reports how many need re-indexing, and until they are, retrieval finds nothing.'
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelconfig.EmbeddingChange'
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
        "502":
          description: Bad Gateway
      summary: Set the workspace's embedding model
      tags:
      - modelconfig
  /workspaces/{workspace_id}/model-settings/llm:
    put:
      consumes:
      - application/json
      description: Sets the default provider and model used to answer queries. Changing
        it affects only the next query — nothing is re-indexed.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Set the workspace's completion model
      tags:
      - modelconfig
  /workspaces/{workspace_id}/providers:
    get:
      description: Returns the provider catalog annotated with which providers this
        workspace has an API key for. The key itself is never returned, only a 4-character
        hint.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/modelconfig.ProviderStatus'
            type: array
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: List model providers
      tags:
      - modelconfig
  /workspaces/{workspace_id}/providers/{provider}/credential:
    delete:
      description: Removes the workspace's stored API key for a provider.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      - description: Provider ID
        in: path
        name: provider
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Delete a provider API key
      tags:
      - modelconfig
    put:
      consumes:
      - application/json
      description: Stores an API key for a provider (BYOK), encrypted at rest. The
        key is validated against the provider before being saved, so an invalid key
        is rejected here rather than failing later mid-answer.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      - description: Provider ID
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
        "502":
          description: Bad Gateway
      summary: Save a provider API key
      tags:
      - modelconfig
  /workspaces/{workspace_id}/providers/{provider}/models:
    get:
      description: Lists the models the workspace's API key can reach, fetched live
        from the provider rather than from a hardcoded list.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      - description: Provider ID
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/types.ModelInfo'
            type: array
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
        "502":
          description: Bad Gateway
      summary: List a provider's models
      tags:
      - modelconfig
  /workspaces/{workspace_id}/reindex:
    post:
      description: Queues re-ingestion of all the workspace's sources, re-embedding
        them with the current embedding model. Required after changing the embedding
        model, since a source's existing vectors belong to the previous model's collection.
        Returns immediately; progress streams per source over /sources/{id}/status.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/modelconfig.reindexResponse'
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error
      summary: Re-index every source in the workspace
      tags:
      - modelconfig
swagger: "2.0"
